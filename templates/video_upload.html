<!DOCTYPE html>
<html>
<head>
    <title>Upload Video</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4f7cff;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #3a63e0;
        }

        .progress {
            margin-top: 15px;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #4f7cff;
            transition: width 0.3s;
        }

        .result {
            margin-top: 20px;
            font-size: 14px;
        }

        .result p {
            margin: 6px 0;
        }

        .download {
            display: inline-block;
            margin-top: 10px;
            color: #4f7cff;
            text-decoration: none;
            font-weight: bold;
        }

        .download:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📤 Upload Video</h2>

    <input type="file" id="videoFile">
    <button onclick="uploadVideo()">Upload & Analyze</button>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
async function uploadVideo() {
    const file = document.getElementById("videoFile").files[0];
    if (!file) {
        alert("Select video");
        return;
    }

    const formData = new FormData();
    formData.append("video", file);

    document.getElementById("result").innerHTML = "⏳ Processing... please wait";

    const res = await fetch("/upload-video-report", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.error) {
        document.getElementById("result").innerHTML = "❌ " + data.error;
        return;
    }

    document.getElementById("result").innerHTML = `
        <h3>📊 Analysis Result</h3>
        <p><b>Total People:</b> ${data.total_people}</p>
        <p><b>Unique People:</b> ${data.unique_people}</p>
        <p><b>Max People:</b> ${data.max_people}</p>
        <p><b>Duration:</b> ${data.duration}s</p>
        <p><b>Resolution:</b> ${data.resolution}</p>
        <p><b>Density:</b> ${data.density}%</p>
        <a href="${data.pdf_url}" target="_blank">📄 Download Report</a>
    `;
}
</script>

</body>
</html>
